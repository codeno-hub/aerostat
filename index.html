<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroStat — Geographic Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div id="app">
    <div id="loading">
      <svg class="ld-ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="14"/></svg>
      <span class="ld-text">Initializing AeroStat</span>
    </div>

    <nav id="navbar">
      <div id="logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="4.5" fill="#7dd3fc" opacity=".9"/>
          <ellipse cx="14" cy="14" rx="13" ry="5" stroke="#7dd3fc" stroke-width="1.1" fill="none" opacity=".45"/>
          <ellipse cx="14" cy="14" rx="5" ry="13" stroke="#7dd3fc" stroke-width=".7" fill="none" opacity=".2"/>
          <circle cx="14" cy="14" r="13" stroke="rgba(125,211,252,0.12)" stroke-width=".7" fill="none"/>
        </svg>
        <span id="logo-text">AeroStat</span>
      </div>

      <div id="search-wrap">
        <svg class="s-icon" width="13" height="13" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="#9ca3af" stroke-width="1.2"/>
          <path d="M9.5 9.5L12 12" stroke="#9ca3af" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search country, capital, ISO…" autocomplete="off">
        <div id="autocomplete"></div>
      </div>

      <div id="nav-tabs">
        <button class="nav-tab active" data-view="globe">Globe</button>
        <button class="nav-tab" data-view="rankings">Rankings</button>
        <button class="nav-tab" data-view="compare">Compare</button>
        <button class="nav-tab" data-view="rates">Rates</button>
        <button class="nav-tab" id="heatmap-btn">Heatmap</button>
      </div>
    </nav>

    <div id="globe-container"></div>
    <div id="tooltip"></div>

    <!-- Side Panel -->
    <div id="side-panel">
      <button class="close-btn" id="close-panel">✕</button>
      <div id="panel-header">
        <div class="p-top">
          <div id="p-flag"></div>
          <div><div id="p-name"></div><div id="p-official"></div></div>
        </div>
        <div id="p-tags"></div>
      </div>
      <div id="panel-body"></div>
    </div>

    <!-- Rankings Overlay -->
    <div class="overlay" id="ov-rankings">
      <div class="overlay-header">
        <span class="overlay-title">🏆 Country Rankings</span>
        <button class="ov-close" onclick="AeroStat.closeOverlay('rankings')">✕ Close</button>
      </div>
      <div class="overlay-body">
        <div class="rank-filters" id="rank-filters"></div>
        <div id="rank-list"></div>
      </div>
    </div>

    <!-- Compare Overlay -->
    <div class="overlay" id="ov-compare">
      <div class="overlay-header">
        <span class="overlay-title">⚖️ Compare Countries</span>
        <button class="ov-close" onclick="AeroStat.closeOverlay('compare')">✕ Close</button>
      </div>
      <div class="overlay-body">
        <div style="margin-bottom:16px">
          <div style="font-size:12px;color:var(--dim);margin-bottom:8px">Search and add countries to compare (max 4)</div>
          <div id="search-wrap-cmp" style="position:relative;max-width:340px">
            <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4" width="13" height="13" viewBox="0 0 14 14" fill="none">
              <circle cx="6" cy="6" r="4.5" stroke="#9ca3af" stroke-width="1.2"/>
              <path d="M9.5 9.5L12 12" stroke="#9ca3af" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="cmp-input" placeholder="Add a country…" autocomplete="off" class="cmp-search-input">
            <div id="cmp-autocomplete" class="cmp-ac"></div>
          </div>
        </div>
        <div id="cmp-list"></div>
      </div>
    </div>

    <!-- Rates Overlay -->
    <div class="overlay" id="ov-rates">
      <div class="overlay-header">
        <span class="overlay-title">💱 Exchange Rates</span>
        <button class="ov-close" onclick="AeroStat.closeOverlay('rates')">✕ Close</button>
      </div>
      <div class="overlay-body">
        <div style="margin-bottom:16px">
          <label style="font-size:12px;color:var(--dim);display:block;margin-bottom:6px">Base currency</label>
          <select id="base-currency" class="cur-select">
            <option value="USD">USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="JPY">JPY — Japanese Yen</option>
            <option value="INR">INR — Indian Rupee</option>
            <option value="CNY">CNY — Chinese Yuan</option>
            <option value="AUD">AUD — Australian Dollar</option>
            <option value="CAD">CAD — Canadian Dollar</option>
          </select>
        </div>
        <div id="rates-updated" class="rates-meta"></div>
        <div id="rates-grid" class="ex-grid"></div>
      </div>
    </div>

    <div id="bot">
      <span id="coord-display">Drag to explore</span>
      <div class="dot-s"></div>
      <span>Scroll to zoom</span>
      <div class="dot-s"></div>
      <span id="country-count">Loading…</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/utils/api.js"></script>
  <script src="src/components/globe.js"></script>
  <script src="src/components/panel.js"></script>
  <script src="src/components/rankings.js"></script>
  <script src="src/components/compare.js"></script>
  <script src="src/components/rates.js"></script>
  <script src="src/components/search.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
